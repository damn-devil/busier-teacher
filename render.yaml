services:
  - type: web
    name: bsuir-teacher-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn api.bot:app --bind 0.0.0.0:$PORT
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: ADMIN_CHAT_ID
        sync: false
