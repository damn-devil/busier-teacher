services:
  - type: web
    name: bsuir-teacher-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python api.bot.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: ADMIN_CHAT_ID
        sync: false
